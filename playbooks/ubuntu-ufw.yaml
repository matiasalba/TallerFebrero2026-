---
- hosts: ubuntu
  become: yes

  tasks:

  - name: Reset ufw
    community.general.ufw:
      state: reset

  - name: Allow outgoing traffic
    community.general.ufw:
      policy: allow
      direction: outgoing

  - name: Deny incomming traffic
    community.general.ufw:
      policy: deny
      direction: incoming

  - name: Allow SSH
    community.general.ufw:
      rule: allow
      name: OpenSSH

  - name: Enable ufw firewall
    community.general.ufw:
      state: enabled
